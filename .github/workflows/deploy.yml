name: Build and Deploy Flask App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push to ECR and Deploy to EC2
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest ./app
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command             --instance-ids ${{ secrets.EC2_INSTANCE_ID }}             --document-name "AWS-RunShellScript"             --parameters commands=[
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}",
              "docker pull ${{ secrets.ECR_REPOSITORY }}:latest",
              "docker stop flask-app || true",
              "docker rm flask-app || true",
              "docker run -d --name flask-app -p 5000:5000 --restart always ${{ secrets.ECR_REPOSITORY }}:latest"
            ]             --region ${{ secrets.AWS_REGION }}
